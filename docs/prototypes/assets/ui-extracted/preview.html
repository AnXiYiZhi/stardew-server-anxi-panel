<!doctype html><html><head><meta charset='utf-8'><title>Stardew UI Extracted Assets</title>
<style>
    body{margin:0;background:#14100b;color:#ead8ad;font:14px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}
    main{padding:24px;max-width:1280px;margin:auto}
    h1{font-size:22px;margin:0 0 8px}
    h2{font-size:16px;margin:28px 0 12px;color:#f3c15e}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
    figure{margin:0;background:#22180f;border:1px solid #5a3d20;border-radius:6px;padding:10px}
    .checker{min-height:72px;display:flex;align-items:center;justify-content:center;padding:8px;background-color:#2b2118;background-image:linear-gradient(45deg,#36291d 25%,transparent 25%),linear-gradient(-45deg,#36291d 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#36291d 75%),linear-gradient(-45deg,transparent 75%,#36291d 75%);background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0}
    img{max-width:100%;image-rendering:auto}
    figcaption{margin-top:8px;color:#f5e6c6;font-size:12px;word-break:break-all}
    small{display:block;color:#b89b66;margin-top:3px}
    </style></head><body><main>
<h1>Stardew UI Extracted Assets</h1>
<p>所有按钮和输入类素材已清理文字，可直接作为 HTML/CSS 背景复用。坐标来源保存在 manifest.json。</p>
<h2>backgrounds</h2><section class='grid'>
<figure><div class='checker'><img src='backgrounds/background_parchment_tile.png' alt='background_parchment_tile'></div><figcaption>background_parchment_tile<small>无文字羊皮纸背景纹理，可平铺</small></figcaption></figure>
<figure><div class='checker'><img src='backgrounds/background_sidebar_wood_tile.png' alt='background_sidebar_wood_tile'></div><figcaption>background_sidebar_wood_tile<small>深色木板侧栏纹理，可平铺</small></figcaption></figure>
<figure><div class='checker'><img src='backgrounds/background_frame_wood_strip.png' alt='background_frame_wood_strip'></div><figcaption>background_frame_wood_strip<small>窗口木框横向纹理</small></figcaption></figure>
<figure><div class='checker'><img src='backgrounds/background_app_black.png' alt='background_app_black'></div><figcaption>background_app_black<small>原型黑色舞台背景</small></figcaption></figure>
</section>

<figure><div class='checker'><img src='layout/layout_install_window_shell_blank.png' alt='layout_install_window_shell_blank'></div><figcaption>layout_install_window_shell_blank<small>安装向导整窗空白壳</small></figcaption></figure>
<figure><div class='checker'><img src='layout/layout_overview_window_shell_blank.png' alt='layout_overview_window_shell_blank'></div><figcaption>layout_overview_window_shell_blank<small>日常运行总览整窗空白壳</small></figcaption></figure>

</section>
<h2>panels</h2><section class='grid'>
<figure><div class='checker'><img src='panels/panel_parchment_form_blank.png' alt='panel_parchment_form_blank'></div><figcaption>panel_parchment_form_blank<small>表单卡片空白底</small></figcaption></figure>

<figure><div class='checker'><img src='navigation/tab_top_green_blank.png' alt='tab_top_green_blank'></div><figcaption>tab_top_green_blank<small>顶部绿色编号标签</small></figcaption></figure>
<figure><div class='checker'><img src='navigation/tab_content_active_blank.png' alt='tab_content_active_blank'></div><figcaption>tab_content_active_blank<small>内容页激活标签</small></figcaption></figure>

<figure><div class='checker'><img src='buttons/button_health_check_brown_blank.png' alt='button_health_check_brown_blank'></div><figcaption>button_health_check_brown_blank<small>健康检查深棕按钮</small></figcaption></figure>

<figure><div class='checker'><img src='buttons/button_menu_square_blank.png' alt='button_menu_square_blank'></div><figcaption>button_menu_square_blank<small>方形更多菜单按钮</small></figcaption></figure>
<figure><div class='checker'><img src='buttons/button_table_icon_square_blank.png' alt='button_table_icon_square_blank'></div><figcaption>button_table_icon_square_blank<small>表格行小图标按钮</small></figcaption></figure>
</section>
<h2>fields</h2><section class='grid'>
<figure><div class='checker'><img src='fields/field_invite_code_input_blank.png' alt='field_invite_code_input_blank'></div><figcaption>field_invite_code_input_blank<small>邀请码输入框</small></figcaption></figure>

</section>
<h2>sprites</h2><section class='grid'>

<figure><div class='checker'><img src='sprites/sprite_cloud_left.png' alt='sprite_cloud_left'></div><figcaption>sprite_cloud_left<small>像素云朵左</small></figcaption></figure>

<figure><div class='checker'><img src='icons/icon_nav_server_control.png' alt='icon_nav_server_control'></div><figcaption>icon_nav_server_control<small>导航服务器控制图标</small></figcaption></figure>

<figure><div class='checker'><img src='icons/icon_top_summary_save.png' alt='icon_top_summary_save'></div><figcaption>icon_top_summary_save<small>顶部存档摘要图标</small></figcaption></figure>
<figure><div class='checker'><img src='icons/icon_top_summary_players.png' alt='icon_top_summary_players'></div><figcaption>icon_top_summary_players<small>顶部玩家摘要图标</small></figcaption></figure>

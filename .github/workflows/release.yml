name: Release Panel Image

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-panel-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_IMAGE: anxiyizhi/stardew-server-anxi-panel
  ACR_REGISTRY: crpi-9z3bkb9g7fxeohrg.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: crpi-9z3bkb9g7fxeohrg.cn-hangzhou.personal.cr.aliyuncs.com/anxi-panel/stardew-server-anxi-panel

jobs:
  release:
    name: Build and publish panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA::12}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ghcr_owner="$(printf '%s' "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')"

          {
            echo "version=$version"
            echo "commit=$commit"
            echo "build_date=$build_date"
            echo "ghcr_image=ghcr.io/${ghcr_owner}/stardew-server-anxi-panel"
            echo "tags<<EOF"
            echo "${DOCKERHUB_IMAGE}:${version}"
            echo "${DOCKERHUB_IMAGE}:latest"
            echo "${ACR_IMAGE}:${version}"
            echo "${ACR_IMAGE}:latest"
            echo "ghcr.io/${ghcr_owner}/stardew-server-anxi-panel:${version}"
            echo "ghcr.io/${ghcr_owner}/stardew-server-anxi-panel:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=panel
          cache-to: type=gha,mode=max,scope=panel

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Stardew Server Anxi Panel ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            deploy/run.sh

name: Release Panel Image

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-panel-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_IMAGE: anxiyizhi/stardew-server-anxi-panel
  ACR_REGISTRY: crpi-9z3bkb9g7fxeohrg.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_IMAGE: crpi-9z3bkb9g7fxeohrg.cn-hangzhou.personal.cr.aliyuncs.com/anxi-panel/stardew-server-anxi-panel

jobs:
  release:
    name: Build and publish panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run release gates
        shell: bash
        run: |
          python scripts/compatibility_matrix.py validate backend/internal/games/stardew_junimo/config/runtime_stack_manifest.json
          python scripts/compatibility_matrix.py check-panel-version backend/internal/games/stardew_junimo/config/runtime_stack_manifest.json --version "${GITHUB_REF_NAME#v}"
          python scripts/compatibility_matrix.py verify-remote-artifacts backend/internal/games/stardew_junimo/config/runtime_stack_manifest.json
          python -m unittest discover -s scripts/tests -p 'test_compatibility_matrix.py'
          bash scripts/tests/test_run_sh_update.sh
          bash scripts/tests/test_migrate_fnos.sh
          shellcheck deploy/migrate-fnos.sh scripts/tests/test_migrate_fnos.sh
          (cd backend && go test ./...)
          (cd backend && go vet ./...)
          (cd backend && PANEL_RUN_DOCKER_UPDATE_TEST=1 go test ./internal/updater -run '^TestDockerIntegration' -count=1)
          (cd backend && go test -tags=integration ./internal/docker)
          (cd frontend && npm ci && npm run test:command-results && npm run test:update-status && npm run test:panel-update && npm run test:junimo-update && npm run test:component-update-flow && npm run test:runtime-components && npm run test:smapi-update && npm run test:farm-catalog && npm run test:save-import && npm run build)

      - name: Prepare release metadata
        id: meta
        shell: bash
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          : "${GHCR_OWNER:?GHCR_OWNER is required}"
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA::12}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ghcr_owner="$(printf '%s' "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')"

          {
            echo "version=$version"
            echo "commit=$commit"
            echo "build_date=$build_date"
            echo "ghcr_image=ghcr.io/${ghcr_owner}/stardew-server-anxi-panel"
            echo "tags<<EOF"
            echo "${DOCKERHUB_IMAGE}:${version}"
            echo "${DOCKERHUB_IMAGE}:latest"
            echo "${ACR_IMAGE}:${version}"
            echo "${ACR_IMAGE}:latest"
            echo "ghcr.io/${ghcr_owner}/stardew-server-anxi-panel:${version}"
            echo "ghcr.io/${ghcr_owner}/stardew-server-anxi-panel:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          subject="$(git log -1 --format=%s "${tag}^{}")"
          tag_message="$(git for-each-ref --format='%(contents)' "refs/tags/${tag}")"
          details="$(printf '%s\n' "$tag_message" | tail -n +2 | sed '/./,$!d')"

          if [[ -z "${details//[[:space:]]/}" ]]; then
            commit_message="$(git log -1 --format=%B "${tag}^{}")"
            details="$(printf '%s\n' "$commit_message" | tail -n +2 | sed '/./,$!d')"
          fi

          if [[ -z "${details//[[:space:]]/}" ]]; then
            details="- ${subject}"
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          notes_path="${RUNNER_TEMP}/release-notes.md"
          {
            printf '## %s\n\n' "$tag"
            printf '%s\n\n' "$details"
            if [[ -n "$previous_tag" ]]; then
              printf '**完整变更**：https://github.com/%s/compare/%s...%s\n' \
                "$GITHUB_REPOSITORY" "$previous_tag" "$tag"
            else
              printf '**完整提交记录**：https://github.com/%s/commits/%s\n' \
                "$GITHUB_REPOSITORY" "$tag"
            fi
          } > "$notes_path"

          echo "path=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=panel
          cache-to: type=gha,mode=max,scope=panel

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Stardew Server Anxi Panel ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            deploy/run.sh
            deploy/migrate-fnos.sh
            deploy/repair-junimo-0.3.5.sh
